# fly.toml app configuration file generated for matvii-portfolio-bot on 2026-04-25T09:11:52+03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'matvii-portfolio-bot'
primary_region = 'fra'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[mounts]
  source = 'db_data'
  destination = '/app/data'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
