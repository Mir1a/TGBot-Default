services:
  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8080"
    volumes:
      - ./app:/app/app
      - db_data:/app/data

  sqlite-web:
    image: coleifer/sqlite-web
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - db_data:/data
    environment:
      - SQLITE_DATABASE=users.db
    working_dir: /data
    depends_on:
      - bot

volumes:
  db_data:
